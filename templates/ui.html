<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResumeIQ</title>

  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      box-sizing: border-box;
    }

    *, *::before, *::after {
      box-sizing: inherit;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #0f172a;
      color: #fff;
    }

    body {
      min-height: 100vh;
    }

    .bg-slate-950 { background-color: #0f172a; }
    .bg-slate-900 { background-color: #111827; }
    .bg-slate-800 { background-color: #1f2937; }
    .bg-slate-700 { background-color: #334155; }
    .bg-yellow-400 { background-color: #facc15; }
    .bg-green-900 { background-color: #052e16; }
    .bg-red-900 { background-color: #7f1d1d; }

    .text-white { color: #fff; }
    .text-black { color: #000; }
    .text-slate-400 { color: #94a3b8; }
    .text-yellow-400 { color: #facc15; }
    .text-green-300 { color: #86efac; }
    .text-red-300 { color: #fda4af; }
    .text-green-400 { color: #4ade80; }

    .min-h-screen { min-height: 100vh; }
    .max-w-6xl { max-width: 72rem; }
    .mx-auto { margin-left: auto; margin-right: auto; }
    .px-4 { padding-left: 1rem; padding-right: 1rem; }
    .py-10 { padding-top: 2.5rem; padding-bottom: 2.5rem; }
    .p-10 { padding: 2.5rem; }
    .p-8 { padding: 2rem; }
    .p-6 { padding: 1.5rem; }
    .p-4 { padding: 1rem; }
    .p-3 { padding: 0.75rem; }
    .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
    .px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
    .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }

    .rounded-3xl { border-radius: 1.5rem; }
    .rounded-2xl { border-radius: 1rem; }
    .rounded-xl { border-radius: 0.75rem; }
    .rounded-full { border-radius: 9999px; }

    .border { border-width: 1px; border-style: solid; }
    .border-2 { border-width: 2px; }
    .border-dashed { border-style: dashed; }
    .border-slate-800 { border-color: #1f2937; }
    .border-slate-700 { border-color: #374151; }
    .border-t-yellow-400 { border-top-color: #facc15; }

    .shadow-xl { box-shadow: 0 20px 25px -5px rgba(15, 23, 42, 0.25), 0 10px 10px -5px rgba(15, 23, 42, 0.25); }

    .text-center { text-align: center; }
    .block { display: block; }
    .cursor-pointer { cursor: pointer; }
    .hover\:bg-slate-800:hover { background-color: #1e293b; }
    .hover\:scale-\[1\.01\]:hover { transform: scale(1.01); }
    .transition { transition: all 0.2s ease-in-out; }
    .hidden { display: none; }
    .w-full { width: 100%; }
    .w-12 { width: 3rem; }
    .h-12 { height: 3rem; }
    .h-36 { height: 9rem; }
    .h-3 { height: 0.75rem; }

    .mb-10 { margin-bottom: 2.5rem; }
    .mb-5 { margin-bottom: 1.25rem; }
    .mb-4 { margin-bottom: 1rem; }
    .mt-6 { margin-top: 1.5rem; }
    .mt-4 { margin-top: 1rem; }
    .mt-2 { margin-top: 0.5rem; }

    .text-5xl { font-size: 3rem; line-height: 1; }
    .text-4xl { font-size: 2.25rem; line-height: 1.1; }
    .text-xl { font-size: 1.25rem; line-height: 1.75rem; }
    .font-bold { font-weight: 700; }
    .font-semibold { font-weight: 600; }

    .bg-slate-900 .text-slate-400 { color: #94a3b8; }
    .bg-slate-900 .text-green-400 { color: #4ade80; }

    .focus\:outline-none:focus { outline: none; }
    .focus\:border-yellow-400:focus { border-color: #facc15; }
    .space-y-6 > * + * { margin-top: 1.5rem; }
    .flex { display: flex; }
    .flex-wrap { flex-wrap: wrap; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 0.5rem; }

    .animate-spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    textarea { font-family: inherit; color: inherit; }
  </style>

</head>

<body class="bg-slate-950 text-white min-h-screen">

  <div class="max-w-6xl mx-auto px-4 py-10">


    <!-- Hero -->

    <div class="text-center mb-10">

      <h1 class="text-5xl font-bold text-yellow-400">
        ResumeIQ
      </h1>

      <p class="text-slate-400 mt-3">
        AI Powered Resume Analyzer
      </p>

    </div>

    <!-- Upload Card -->

    <div class="bg-slate-900 rounded-3xl p-8 border border-slate-800 shadow-xl">

      <form id="resumeForm">

        <label
          class="block border-2 border-dashed border-yellow-400 rounded-2xl p-10 text-center cursor-pointer hover:bg-slate-800 transition">

          <div class="text-5xl mb-4">
            📄
          </div>

          <h3 class="text-xl font-semibold">
            Upload Resume
          </h3>

          <p id="filename" class="text-slate-400 mt-2">
            Choose PDF File
          </p>

          <input id="resume" type="file" name="file" accept=".pdf" class="hidden" required>

        </label>

        <textarea name="job_description" placeholder="Paste Job Description..."
          class="w-full mt-6 bg-slate-950 border border-slate-700 rounded-xl p-4 h-36 focus:outline-none focus:border-yellow-400"></textarea>

        <button
          class="w-full mt-6 bg-yellow-400 text-black py-4 rounded-xl font-bold text-lg hover:scale-[1.01] transition">
          Analyze Resume
        </button>

      </form>

    </div>

    <!-- Loading -->

    <div id="loading" class="hidden text-center py-10">

      <div class="w-12 h-12 border-4 border-slate-700 border-t-yellow-400 rounded-full animate-spin mx-auto">
      </div>

      <p class="mt-4 text-slate-400">
        Analyzing Resume...
      </p>

    </div>

    <!-- Results -->

    <div id="result" class="mt-8 space-y-6">
    </div>


  </div>

  <script>

    const resumeInput = document.getElementById("resume");

    resumeInput.addEventListener("change", () => {
      if (resumeInput.files.length > 0) {
        document.getElementById("filename").innerText =
          resumeInput.files[0].name;
      }
    });

    document
      .getElementById("resumeForm")
      .addEventListener("submit", async (e) => {

        e.preventDefault();

        const resultDiv = document.getElementById("result");

        resultDiv.innerHTML = "";

        document
          .getElementById("loading")
          .classList.remove("hidden");

        try {

          const formData = new FormData(e.target);

          const response = await fetch("/upload", {
            method: "POST",
            body: formData
          });

          const data = await response.json();

          document
            .getElementById("loading")
            .classList.add("hidden");

          if (data.error) {

            resultDiv.innerHTML = `
                <div class="bg-red-900 p-6 rounded-2xl">
                    <h2 class="text-xl font-bold">
                        Error
                    </h2>
                    <p class="mt-2">
                        ${data.error}
                    </p>
                </div>
                `;

            return;
          }

          let confidenceHTML = "";

          data.role_confidence.forEach(item => {

            confidenceHTML += `
                <div class="mb-4">

                    <div class="flex justify-between mb-1">
                        <span>${item.role}</span>
                        <span>${item.confidence}%</span>
                    </div>

                    <div class="w-full bg-slate-700 rounded-full h-3">

                        <div
                            class="bg-yellow-400 h-3 rounded-full"
                            style="width:${item.confidence}%">
                        </div>

                    </div>

                </div>
                `;
          });

          resultDiv.innerHTML = `

            <div class="bg-slate-900 rounded-3xl p-6 border border-slate-800">

                <h2 class="text-xl text-slate-400">
                    Predicted Role
                </h2>

                <p class="text-4xl font-bold text-yellow-400 mt-2">
                    ${data.predicted_role}
                </p>

            </div>

            <div class="bg-slate-900 rounded-3xl p-6 border border-slate-800">

                <h2 class="text-xl font-bold mb-5">
                    🏆 Career Matches
                </h2>

                ${confidenceHTML}

            </div>

            <div class="bg-slate-900 rounded-3xl p-6 border border-slate-800">

                <h2 class="text-xl font-bold mb-4">
                    🛠 Skills Found (${data.total_skills_found})
                </h2>

                <div class="flex flex-wrap gap-2">

                    ${data.skills_found.map(skill => `
                    <span class="bg-green-900 text-green-300 px-3 py-2 rounded-full">
                        ${skill}
                    </span>
                    `).join("")}

                </div>

            </div>

            <div class="bg-slate-900 rounded-3xl p-6 border border-slate-800">

                <h2 class="text-xl font-bold mb-4">
                    ❌ Missing Skills
                </h2>

                <div class="flex flex-wrap gap-2">

                    ${data.missing_skills.length > 0
              ?
              data.missing_skills.map(skill => `
                        <span class="bg-red-900 text-red-300 px-3 py-2 rounded-full">
                            ${skill}
                        </span>
                        `).join("")
              :
              `
                        <span class="text-green-400">
                            No Missing Skills 🎉
                        </span>
                        `
            }

                </div>

            </div>

            <div class="bg-slate-900 rounded-3xl p-6 border border-slate-800">

                <h2 class="text-xl font-bold mb-4">
                    💡 Suggestions
                </h2>

                ${data.suggestions.length > 0
              ?
              data.suggestions.map(item => `
                    <div class="bg-slate-800 rounded-xl p-3 mb-2">
                        ${item}
                    </div>
                    `).join("")
              :
              `
                    <div class="text-green-400">
                        Resume matches requirements.
                    </div>
                    `
            }

            </div>

            `;

        }
        catch (error) {

          document
            .getElementById("loading")
            .classList.add("hidden");

          resultDiv.innerHTML = `
            <div class="bg-red-900 p-6 rounded-2xl">
                <h2 class="text-xl font-bold">
                    Server Error
                </h2>
                <p class="mt-2">
                    Could not connect to backend.
                </p>
            </div>
            `;
        }

      });

  </script>

</body>

</html>
